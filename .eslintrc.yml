env:
  browser: true
  es2021: true

extends:
  - eslint:recommended
  - plugin:@typescript-eslint/strict-type-checked
  - plugin:promise/recommended
  - plugin:playwright/recommended

parser: "@typescript-eslint/parser"
parserOptions:
  ecmaVersion: latest
  sourceType: module
  project: tsconfig.json

plugins:
  - promise
  - playwright

rules:
  no-console: error
  no-alert: error
  no-debugger: error
  no-void: error

  "@typescript-eslint/ban-ts-comment":
    - error
    - ts-nocheck: false
