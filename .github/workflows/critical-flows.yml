    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if critical API tests exist
        id: check_tests
        run: |
          # Search for tests with both @critical and @api tags
          if grep -rE "@critical.*@api|@api.*@critical" tests/ --include="*.ts" > /dev/null 2>&1; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
            echo "Critical API tests found"
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "No critical API tests found - remaining steps will be skipped"
          fi

      - name: Load environment variables
        if: steps.check_tests.outputs.has_tests == 'true'
