name: Critical Flows

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run tests on"
        required: true
        type: choice
        options:
          - stage
          - beta
          - prod
        default: "stage"
  repository_dispatch:
    types: [run-critical-flows-beta, run-critical-flows-box]

concurrency:
  group: critical-flows-${{ github.event.client_payload.environment || inputs.environment || 'stage' }}
  cancel-in-progress: true

env:
  EFFECTIVE_ENV: ${{ github.event.client_payload.environment || inputs.environment || 'stage' }}

jobs:
  critical-chrome:
    name: "Critical Flows in Chrome on ${{ github.event.client_payload.environment || inputs.environment }}"
    runs-on:
      labels: ubuntu-24.04-4core-16gb

    env:
      BASE_URL:
        ${{ (github.event.client_payload.environment || inputs.environment) == 'prod' && vars.PROD_BASE_URL ||
        (github.event.client_payload.environment || inputs.environment) == 'beta' && vars.BETA_BASE_URL ||
        vars.STAGE_BASE_URL }}
      TESTMO_TOKEN: ${{ secrets.TESTMO_TOKEN }}
      USER_3768: ${{ secrets.USER_3768 }}
      USER_3768_PASSWORD: ${{ secrets.USER_3768_PASSWORD }}
      USER_3051: ${{ secrets.USER_3051 }}
      USER_3051_PASSWORD: ${{ secrets.USER_3051_PASSWORD }}
      USER_4279: ${{ secrets.USER_4279 }}
      USER_4279_PASSWORD: ${{ secrets.USER_4279_PASSWORD }}
      USER_4278: ${{ secrets.USER_4278 }}
      USER_4278_PASSWORD: ${{ secrets.USER_4278_PASSWORD }}
      USER_4278_1: ${{ secrets.USER_4278_1 }}
      USER_4278_1_PASSWORD: ${{ secrets.USER_4278_1_PASSWORD }}
      USER_4127: ${{ secrets.USER_4127 }}
      USER_4127_PASSWORD: ${{ secrets.USER_4127_PASSWORD }}
      USER_3563: ${{ secrets.USER_3563 }}
      USER_3563_PASSWORD: ${{ secrets.USER_3563_PASSWORD }}
      USER_3567: ${{ secrets.USER_3567 }}
      USER_3567_PASSWORD: ${{ secrets.USER_3567_PASSWORD }}
      USER_3570_PASSWORD: ${{ secrets.USER_3570_PASSWORD }}
      USER_3569_PASSWORD: ${{ secrets.USER_3569_PASSWORD }}
      USER_3576_PASSWORD: ${{ secrets.USER_3576_PASSWORD }}
      USER_482035_PASSWORD: ${{ secrets.USER_482035_PASSWORD }}
      USER_2365_PASSWORD: ${{ secrets.USER_2365_PASSWORD }}
      USER_357955_PASSWORD: ${{ secrets.USER_357955_PASSWORD }}
      USER_243071_PASSWORD: ${{ secrets.USER_243071_PASSWORD }}
      USER_357953_PASSWORD: ${{ secrets.USER_357953_PASSWORD }}
      USER_243088_PASSWORD: ${{ secrets.USER_243088_PASSWORD }}
      USER_WITH_EXPLORE_PASSWORD: ${{ secrets.USER_WITH_EXPLORE_PASSWORD }}
      USER_3435_PASSWORD: ${{ secrets.USER_3435_PASSWORD }}
      USER_CLOUDSCORM_PASSWORD: ${{ secrets.USER_CLOUDSCORM_PASSWORD }}
      USER_3439_PASSWORD: ${{ secrets.USER_3439_PASSWORD }}
      SCORM3439_PASSWORD: ${{ secrets.SCORM3439_PASSWORD }}
      USER_243094_PASSWORD: ${{ secrets.USER_243094_PASSWORD }}
      USER_243119_PASSWORD: ${{ secrets.USER_243119_PASSWORD }}
      USER_2504_PASSWORD: ${{ secrets.USER_2504_PASSWORD }}
      USER_2504_1_PASSWORD: ${{ secrets.USER_2504_1_PASSWORD }}
      USER_3434_PASSWORD: ${{ secrets.USER_3434_PASSWORD }}
      USER_4621_PASSWORD: ${{ secrets.USER_4621_PASSWORD }}
      USER_4622_PASSWORD: ${{ secrets.USER_4622_PASSWORD }}
      USER_4613_PASSWORD: ${{ secrets.USER_4613_PASSWORD }}
      USER_357956_PASSWORD: ${{ secrets.USER_357956_PASSWORD }}
      USER_AUTOMATION_PASSWORD: ${{ secrets.USER_AUTOMATION_PASSWORD }}
      USER_4640_PASSWORD: ${{ secrets.USER_4640_PASSWORD }}
      USER_4639_PASSWORD: ${{ secrets.USER_4639_PASSWORD }}
      USER_4528_PASSWORD: ${{ secrets.USER_4528_PASSWORD }}
      USER_679595_PASSWORD: ${{ secrets.USER_679595_PASSWORD }}
      USER_4654_PASSWORD: ${{ secrets.USER_4654_PASSWORD }}
      USER_4633_PASSWORD: ${{ secrets.USER_4633_PASSWORD }}
      USER_4634_PASSWORD: ${{ secrets.USER_4634_PASSWORD }}
      USER_4649_PASSWORD: ${{ secrets.USER_4649_PASSWORD }}
      USER_4638_PASSWORD: ${{ secrets.USER_4638_PASSWORD }}
      USER_3573_PASSWORD: ${{ secrets.USER_3573_PASSWORD }}
      USER_4616_PASSWORD: ${{ secrets.USER_4616_PASSWORD }}

    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load environment variables
        run: |
          set +x  # Disable command echoing to prevent credential exposure
          ENV_FILE=".env.${{ env.EFFECTIVE_ENV }}"
          if [ -f "$ENV_FILE" ]; then
            while IFS= read -r line; do
              if [[ $line =~ ^[A-Z_]+=.* ]]; then
                echo "$line" >> $GITHUB_ENV
              fi
            done < "$ENV_FILE"
          fi
          set -x  # Re-enable command echoing

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create .auth directory
        run: mkdir -p .auth

      - name: Install dependencies
        if: always()
        run: |
          npm ci
          npm install -g @testmo/testmo-cli

      - name: Install jq
        if: always()
        run: |
          apt-get update
          apt-get install -y jq
        shell: bash

      - name: Set GitHub Actions URL
        run: echo "GITHUB_RUN_URL=${{ github.server_url }}/${{ github.repository
          }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV

      - name: Run critical tests
        id: run_tests_chrome
        if: always()
        run: |
          test_env=${{ env.EFFECTIVE_ENV }} npx playwright test -g @critical --project=chrome --workers=2 --retries=1
        env:
          HOME: /root

      - name: Push results to Testmo
        if: always()
        run: |
          browser=Chrome test_env=${{ env.EFFECTIVE_ENV }} npm run testmo:critical
        env:
          HOME: /root

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-critical-chrome-${{ env.EFFECTIVE_ENV }}-${{
            github.run_id }}
          path: playwright-report/
          retention-days: 3

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-critical-chrome-${{ env.EFFECTIVE_ENV }}-${{ github.run_id }}
          path: results/*.xml

      - name: Parse test-output.json
        if: always()
        run: |
          if [ -f "test-output.json" ]; then
            # Set variables
            TOTAL_DURATION=$(jq -r '.stats.duration | round // 0' test-output.json)
            TOTAL_TESTS=$(jq -r '(.stats.expected // 0) + (.stats.unexpected // 0) + (.stats.skipped // 0) + (.stats.flaky // 0)' test-output.json)
            PASSED_TESTS=$(jq -r '.stats.expected // 0' test-output.json)
            FAILED_TESTS=$(jq -r '.stats.unexpected // 0' test-output.json)
            SKIPPED_TESTS=$(jq -r '.stats.skipped // 0' test-output.json)
            FLAKY_TESTS=$(jq -r '.stats.flaky // 0' test-output.json)
            WORKERS=$(jq -r '.config.workers // 1' test-output.json)
          else
            echo "test-output.json not found, using default values"
            TOTAL_DURATION=0
            TOTAL_TESTS=0
            PASSED_TESTS=0
            FAILED_TESTS=0
            SKIPPED_TESTS=0
            FLAKY_TESTS=0
            WORKERS=0
          fi

          # Output variables
          echo "TOTAL_DURATION=$TOTAL_DURATION" >> $GITHUB_ENV
          echo "TOTAL_TESTS=$TOTAL_TESTS" >> $GITHUB_ENV
          echo "PASSED_TESTS=$PASSED_TESTS" >> $GITHUB_ENV
          echo "FAILED_TESTS=$FAILED_TESTS" >> $GITHUB_ENV
          echo "SKIPPED_TESTS=$SKIPPED_TESTS" >> $GITHUB_ENV
          echo "FLAKY_TESTS=$FLAKY_TESTS" >> $GITHUB_ENV
          echo "WORKERS=$WORKERS" >> $GITHUB_ENV

      - name: Use parsed variables
        if: always()
        run: |
          echo "Total Duration: ${{ env.TOTAL_DURATION }}"
          echo "Total Tests: ${{ env.TOTAL_TESTS }}"
          echo "Passed Tests: ${{ env.PASSED_TESTS }}"
          echo "Failed Tests: ${{ env.FAILED_TESTS }}"
          echo "Skipped Tests: ${{ env.SKIPPED_TESTS }}"
          echo "Flaky Tests: ${{ env.FLAKY_TESTS }}"

      - name: Calculate duration
        if: always()
        run: |
          DURATION_MS=${{ env.TOTAL_DURATION }}
          DURATION_SECONDS=$((DURATION_MS / 1000))
          DURATION_MINUTES=$((DURATION_SECONDS / 60))
          DURATION_REMAINING_SECONDS=$((DURATION_SECONDS % 60))
          echo "DURATION_FORMATTED=${DURATION_MINUTES}m ${DURATION_REMAINING_SECONDS}s" >> $GITHUB_ENV

      - name: Set environment emoji
        if: always()
        run: |
          case "${{ env.EFFECTIVE_ENV }}" in
            "prod")
              echo "ENV_EMOJI=🚀" >> $GITHUB_ENV
              ;;
            "beta")
              echo "ENV_EMOJI=🧪" >> $GITHUB_ENV
              ;;
            "stage")
              echo "ENV_EMOJI=🔬" >> $GITHUB_ENV
              ;;
            *)
              echo "ENV_EMOJI=🔹" >> $GITHUB_ENV
              ;;
          esac

      - name: Notify MS Teams
        if: always()
        uses: jdcargile/ms-teams-notification@v1.3
        with:
          github-token: ${{ github.token }}
          ms-teams-webhook-uri: ${{ secrets.AUTOTESTS_REPORTS_WEBHOOK_URL }}
          notification-summary: |
            Critical Flows Execution Result |
            Env ${{ env.ENV_EMOJI }}: ${{ env.EFFECTIVE_ENV }} |
            Browser: Chrome |
            Total Tests: ${{ env.TOTAL_TESTS }} |
            Workers: ${{ env.WORKERS }} |
            Passed ✅: ${{ env.PASSED_TESTS }} |
            Failed ❌: ${{ env.FAILED_TESTS }} |
            Skipped 🏂: ${{ env.SKIPPED_TESTS }} |
            Flaky 🔄: ${{ env.FLAKY_TESTS }} |
            Total Duration ⏱: ${{ env.DURATION_FORMATTED }} (${{ env.TOTAL_DURATION }} ms)
            Link Testmo runs ${{ secrets.TESTMO_RUNS_URL }}
          notification-color:
            ${{ steps.run_tests_chrome.outcome == 'success' && '#4ae632'
            || '#FF0000' }}

