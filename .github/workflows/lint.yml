name: Lint and Format

on:
  pull_request:
    branches-ignore: []

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Prettier
        run: npm run format
        continue-on-error: false

      - name: Run ESLint
        run: npm run lint:ci
        continue-on-error: false
