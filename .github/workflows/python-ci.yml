name: Python CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: python_playwright/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python_playwright/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Ruff lint
        run: python -m ruff check python_playwright

      - name: Black format check
        run: python -m black --check python_playwright

      - name: Mypy type check
        run: python -m mypy python_playwright

      - name: Run tests (without integration)
        run: python -m pytest -c python_playwright/pytest.ini python_playwright/tests
