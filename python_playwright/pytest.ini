[pytest]
minversion = 8.0
addopts = --verbose -ra --strict-markers --tb=short
testpaths = tests
markers =
    api: API tests
    ui: UI tests
    e2e: End-to-end tests
    integration: Tests that require live environment credentials
    smoke: Smoke tests
    regression: Regression tests
    critical: Critical path tests
    auth: Authentication tests
    explore: Explore page tests
    login: Login page tests
    content: Content management tests
    crud: CRUD operations tests
log_cli = true
log_cli_level = INFO
